<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polly 服飾門市系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #F5A9C6; /* Polly 粉紅色 */
            --primary-dark: #E085A8;
            --text-main: #333333;
            --text-light: #666666;
            --bg-color: #FAFAFA;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(245, 169, 198, 0.4);
            overflow: hidden;
        }

        /* 這裡使用一個預設的服飾圖示，如果託管後有真實 Logo 網址可替換 img src */
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .logo-fallback {
            font-size: 50px;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-light);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }

        .menu-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px 24px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 2px solid transparent;
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card:nth-child(3) { animation-delay: 0.3s; }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(245, 169, 198, 0.3);
            border-color: var(--primary-color);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background-color: rgba(245, 169, 198, 0.15);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .menu-card:hover .icon-wrapper {
            background-color: var(--primary-color);
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        .menu-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .menu-card p {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.5;
        }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            color: #999;
            font-size: 13px;
            text-align: center;
        }

        /* 動畫定義 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 響應式設計 */
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .menu-card {
                padding: 24px 20px;
            }
            .icon-wrapper {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
        }
    </style>
</head>
